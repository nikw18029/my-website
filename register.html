<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <script src="register.js" defer></script>
    <title>Nik Walker's Website</title>
    <link rel="apple-touch-icon" href="/img/logo.png">
    <link rel="icon" href="/img/logo.png">
</head>
<body>
    <div class="content">
        <div class="landing">
            <h1 class="a">Register</h1>
            <form id="register-form">
                <input id="username" class="a" type="text" name="username" placeholder="Username" required><br>
                <input id="firstname" class="a" type="text" name="firstname" placeholder="First Name" required><br>
                <input id="lastname" class="a" type="text" name="lastname" placeholder="Last Name" required><br>
                <input id="email" class="a" type="text" name="email" placeholder="Email" required><br>
                <input id="password" class="a" type="password" name="password" placeholder="Password" required><br>
                <button class="submit" type="submit">Register</button>
            </form>
        </div>
    </div>
