<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" type="text/css" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <script src="games.js" defer></script>
    <title>Nik Walker's Website</title>
</head>

<body>
    <div class="navbar">
        <a class="navbar-button-left" href="/home">Home</a>
        <a class="navbar-button" href="/games">Games</a>
        <a class="navbar-button-right" href="/contact">Contact</a>
    </div>
    <div class="landing">
        <div class="game-selection">
            <div class="game-card">
                <h2 class="game-title">Snake</h2>
                <p class="game-description">Play the classic Snake game!</p>
                <img class="game-image" src="img/snake.png" alt="Snake">
                <button class="play-button" onclick="window.location.href='/play/snake'">Play</button>
            </div>
            <div class="game-card">
                <h2 class="game-title">Flappy Ball</h2>
                <p class="game-description">Flap your ball!</p>
                <img class="game-image" src="img/flappy.png" alt="Flappy Ball">
                <button class="play-button" onclick="window.location.href='/play/flappy'">Play</button>
            </div>
            <div class="game-card">
                <h2 class="game-title">Gravity Flip</h2>
                <p class="game-description">Flip the gravity and the obstacles!</p>
                <img class="game-image" src="img/flip.png" alt="Gravity Flip">
                <button class="play-button" onclick="window.location.href='/play/flip'">Play</button>
            </div>
            <div class="game-card">
                <h2 class="game-title">Draw Something!</h2>
                <p class="game-description">Draw beautiful art using this simple engine</p>
                <img class="game-image" src="img/draw.png" alt="Draw Something!">
                <button class="play-button" onclick="window.location.href='/play/draw'">Play</button>
            </div>
        </div>
    </div>
</body>

</html>
